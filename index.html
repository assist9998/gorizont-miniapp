<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Горизонт — Посещаемость</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
    --accent:#4f8ef7;--accent2:#38d9a9;--danger:#ff6b6b;
    --warning:#ffd43b;--text:#e8eaf0;--text2:#8b90a8;
    --border:#2d3250;--radius:16px;--radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .date-badge{font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:20px}
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 16px}
  .stat{background:var(--surface);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--border)}
  .stat-num{font-size:24px;font-weight:700;line-height:1;margin-bottom:4px}
  .stat-num.green{color:var(--accent2)}.stat-num.red{color:var(--danger)}.stat-num.blue{color:var(--accent)}
  .stat-label{font-size:11px;color:var(--text2);font-weight:500}
  .group-section{margin:8px 16px 0}
  .group-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px}
  .group-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
  .group-count{font-size:12px;color:var(--text2)}
  .child-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s}
  .child-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .2s}
  .child-card.present::before{background:var(--accent2)}
  .child-card.absent::before{background:var(--danger)}
  .child-card.present{border-color:rgba(56,217,169,.25);background:rgba(56,217,169,.05)}
  .child-card.absent{border-color:rgba(255,107,107,.25);background:rgba(255,107,107,.05)}
  .avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;background:var(--surface2);color:var(--accent)}
  .child-info{flex:1;min-width:0}
  .child-name{font-size:15px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .child-meta{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px}
  .time-badge{background:var(--surface2);padding:2px 8px;border-radius:10px;font-size:11px}
  .allergy-dot{width:6px;height:6px;border-radius:50%;background:var(--warning);flex-shrink:0}
  .toggle-btn{width:52px;height:30px;border-radius:15px;border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;background:var(--surface2)}
  .toggle-btn::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:4px;left:4px;transition:transform .25s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
  .toggle-btn.on{background:var(--accent2)}
  .toggle-btn.on::after{transform:translateX(22px)}
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:100}
  .btn-save{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#6c63ff);color:#fff;font-family:'Geologica',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
  .btn-all{padding:14px 18px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end}
  .modal-overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-height:80vh;overflow-y:auto;border-top:1px solid var(--border)}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
  .modal-name{font-size:20px;font-weight:700;margin-bottom:16px}
  .modal-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
  .modal-row:last-child{border-bottom:none}
  .modal-label{color:var(--text2)}
  .modal-value{font-weight:500;text-align:right;max-width:60%}
  .allergy-chip{background:rgba(255,212,59,.15);color:var(--warning);border:1px solid rgba(255,212,59,.3);padding:3px 10px;border-radius:10px;font-size:12px}
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--accent2);color:#0f1117;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:300;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
  .loading{text-align:center;padding:60px 20px;color:var(--text2)}
  .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">🎓 Горизонт</div>
    <div class="date-badge" id="dateDisplay"></div>
  </div>
  <div class="filters" id="filterBar"></div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-num green" id="statPresent">0</div><div class="stat-label">Пришли</div></div>
  <div class="stat"><div class="stat-num red" id="statAbsent">0</div><div class="stat-label">Отсутствуют</div></div>
  <div class="stat"><div class="stat-num blue" id="statTotal">0</div><div class="stat-label">Всего</div></div>
</div>
<div id="childrenList"><div class="loading"><div class="loading-spinner"></div>Загружаем данные...</div></div>
<div class="bottom-bar">
  <button class="btn-all" onclick="markAllPresent()">✅ Все пришли</button>
  <button class="btn-save" onclick="saveAttendance()">Сохранить журнал</button>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modalName"></div>
    <div id="modalContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// Init Telegram WebApp
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

// Date display
const now=new Date();
const days=["вс","пн","вт","ср","чт","пт","сб"];
const months=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
document.getElementById("dateDisplay").textContent=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

// Load children from URL param (passed by bot) or use test data
let children = [];

function loadChildren(){
  // Telegram передаёт startapp параметр через tgWebAppStartParam
  const params = new URLSearchParams(window.location.search);
  
  // Пробуем все возможные параметры
  const dataParam = params.get("data") || 
                    params.get("tgWebAppStartParam") ||
                    (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) ||
                    null;

  console.log("URL params:", window.location.search);
  console.log("dataParam:", dataParam ? dataParam.substring(0,50)+"..." : "null");

  if(dataParam){
    try{
      const decoded = atob(dataParam);
      const parsed = JSON.parse(decoded);
      if(Array.isArray(parsed) && parsed.length > 0){
        children = parsed.filter(c => c.status !== "Выбыл");
        console.log("Loaded from URL:", children.length, "children");
        initApp();
        return;
      }
    }catch(e){
      console.error("Failed to parse data:", e);
    }
  }
  console.log("Using test data");
  loadTestData();
  initApp();
}

function loadTestData(){
  children = [
    {id:"1",name:"Маша Иванова",city:"Дананг",dept:"Детский сад",group:"Младшая",type:"Полный",until:"17:00",parent:"Ирина Иванова|+79161234567|@irina_ivanova",allergy:"Нет",status:"Активный"},
    {id:"2",name:"Петя Смирнов",city:"Дананг",dept:"Детский сад",group:"Младшая",type:"Короткий",until:"13:00",parent:"Андрей Смирнов|+79167654321|@andrey_s",allergy:"Аллергия на мёд",status:"Активный"},
    {id:"3",name:"Соня Козлова",city:"Дананг",dept:"Детский сад",group:"Старшая",type:"Полный",until:"17:00",parent:"Наталья Козлова|+79169876543|@nat_kozlova",allergy:"Непереносимость лактозы",status:"Активный"},
    {id:"4",name:"Миша Попов",city:"Дананг",dept:"Школа",group:"1 класс",type:"Полный",until:"17:00",parent:"Сергей Попов|+79163456789|@sergey_popov",allergy:"Нет",status:"Активный"},
    {id:"5",name:"Аня Волкова",city:"Дананг",dept:"Школа",group:"2 класс",type:"Полный",until:"17:00",parent:"Елена Волкова|+79162345678|@elena_v",allergy:"Аллергия на пыльцу",status:"Активный"},
    {id:"6",name:"Коля Новиков",city:"Нячанг",dept:"Детский сад",group:"Ясельная",type:"Короткий",until:"12:00",parent:"Ольга Новикова|+79165432109|@olga_nov",allergy:"Аллергия на цитрусовые",status:"Активный"},
    {id:"7",name:"Лиза Морозова",city:"Нячанг",dept:"Детский сад",group:"Младшая",type:"Полный",until:"17:30",parent:"Дмитрий Морозов|+79164321098|@dm_morozov",allergy:"Нет",status:"Активный"},
    {id:"8",name:"Ваня Лебедев",city:"Нячанг",dept:"Школа",group:"1 класс",type:"Полный",until:"16:30",parent:"Татьяна Лебедева|+79163210987|@tanya_l",allergy:"Нет",status:"Активный"},
  ];
}

const attendance = {};
let activeCity="", activeDept="", activeGroup="Все группы";

function initApp(){
  children.forEach(c => attendance[c.id] = null);
  const cities = [...new Set(children.map(c=>c.city))];
  activeCity = cities[0] || "";
  const depts = [...new Set(children.filter(c=>c.city===activeCity).map(c=>c.dept))];
  activeDept = depts[0] || "";
  buildFilters();
  renderList();
}

function buildFilters(){
  const cities=[...new Set(children.map(c=>c.city))];
  const depts=[...new Set(children.filter(c=>c.city===activeCity).map(c=>c.dept))];
  const groups=["Все группы",...new Set(children.filter(c=>c.city===activeCity&&c.dept===activeDept).map(c=>c.group))];
  const bar=document.getElementById("filterBar");
  bar.innerHTML="";
  cities.forEach(city=>{
    const btn=document.createElement("button");
    btn.className="filter-btn"+(city===activeCity?" active":"");
    btn.textContent=(city==="Дананг"?"🌊 ":"🌴 ")+city;
    btn.onclick=()=>{activeCity=city;const d=[...new Set(children.filter(c=>c.city===city).map(c=>c.dept))];activeDept=d[0]||"";activeGroup="Все группы";buildFilters();renderList();};
    bar.appendChild(btn);
  });
  const sep=document.createElement("div");sep.style.cssText="width:1px;background:var(--border);flex-shrink:0;margin:0 4px";bar.appendChild(sep);
  depts.forEach(dept=>{
    const btn=document.createElement("button");
    btn.className="filter-btn"+(dept===activeDept?" active":"");
    btn.textContent=dept==="Детский сад"?"🎨 Сад":"📚 Школа";
    btn.onclick=()=>{activeDept=dept;activeGroup="Все группы";buildFilters();renderList();};
    bar.appendChild(btn);
  });
  if(groups.length>2){
    const sep2=document.createElement("div");sep2.style.cssText="width:1px;background:var(--border);flex-shrink:0;margin:0 4px";bar.appendChild(sep2);
    groups.forEach(group=>{
      const btn=document.createElement("button");
      btn.className="filter-btn"+(group===activeGroup?" active":"");
      btn.textContent=group;
      btn.onclick=()=>{activeGroup=group;buildFilters();renderList();};
      bar.appendChild(btn);
    });
  }
}

function getFiltered(){
  return children.filter(c=>c.city===activeCity&&c.dept===activeDept&&(activeGroup==="Все группы"||c.group===activeGroup));
}

function renderList(){
  const filtered=getFiltered();
  const groups={};
  filtered.forEach(c=>{if(!groups[c.group])groups[c.group]=[];groups[c.group].push(c);});
  let html="",totalPresent=0,totalAbsent=0;
  for(const[group,kids]of Object.entries(groups)){
    const present=kids.filter(k=>attendance[k.id]===true).length;
    html+=`<div class="group-section"><div class="group-header"><div class="group-title">${group}</div><div class="group-count">${present}/${kids.length}</div></div>`;
    kids.forEach(child=>{
      const state=attendance[child.id];
      const cls=state===true?"present":state===false?"absent":"";
      const toggleCls=state===true?"on":"";
      const initials=child.name.split(" ").map(w=>w[0]).join("").slice(0,2);
      const hasAllergy=child.allergy&&child.allergy!=="Нет";
      if(state===true)totalPresent++;
      if(state===false)totalAbsent++;
      html+=`<div class="child-card ${cls}" onclick="openModal('${child.id}')">
        <div class="avatar">${initials}</div>
        <div class="child-info">
          <div class="child-name">${child.name}</div>
          <div class="child-meta">
            <span class="time-badge">до ${child.until}</span>
            <span>${child.type}</span>
            ${hasAllergy?'<div class="allergy-dot"></div>':""}
          </div>
        </div>
        <button class="toggle-btn ${toggleCls}" onclick="toggleAttendance(event,'${child.id}')"></button>
      </div>`;
    });
    html+="</div>";
  }
  if(filtered.length===0)html='<div class="empty">Нет детей в этой группе</div>';
  document.getElementById("childrenList").innerHTML=html;
  document.getElementById("statPresent").textContent=totalPresent;
  document.getElementById("statAbsent").textContent=totalAbsent;
  document.getElementById("statTotal").textContent=filtered.length;
}

function toggleAttendance(e,id){e.stopPropagation();attendance[id]=attendance[id]!==true;renderList();}

function markAllPresent(){getFiltered().forEach(c=>attendance[c.id]=true);renderList();showToast("✅ Все отмечены");}

function openModal(id){
  const c=children.find(x=>x.id==id);if(!c)return;
  const parts=(c.parent||"").split("|");
  const hasAllergy=c.allergy&&c.allergy!=="Нет";
  document.getElementById("modalName").textContent=c.name;
  document.getElementById("modalContent").innerHTML=`
    <div class="modal-row"><span class="modal-label">Группа</span><span class="modal-value">${c.group}</span></div>
    <div class="modal-row"><span class="modal-label">Тип</span><span class="modal-value">${c.type} · до ${c.until}</span></div>
    <div class="modal-row"><span class="modal-label">Родитель</span><span class="modal-value">${parts[0]?.trim()||"—"}</span></div>
    <div class="modal-row"><span class="modal-label">Телефон</span><span class="modal-value">${parts[1]?.trim()||"—"}</span></div>
    <div class="modal-row"><span class="modal-label">Telegram</span><span class="modal-value">${parts[2]?.trim()||"—"}</span></div>
    <div class="modal-row"><span class="modal-label">Аллергии</span><span class="modal-value">${hasAllergy?'<span class="allergy-chip">⚠️ '+c.allergy+'</span>':"Нет"}</span></div>
    <div class="modal-row"><span class="modal-label">Сегодня</span><span class="modal-value">${attendance[id]===true?"✅ Пришёл":attendance[id]===false?"❌ Отсутствует":"Не отмечен"}</span></div>
  `;
  document.getElementById("modalOverlay").classList.add("show");
}

function closeModal(e){if(e.target===document.getElementById("modalOverlay"))document.getElementById("modalOverlay").classList.remove("show");}

function saveAttendance(){
  const filtered=getFiltered();
  const unmarked=filtered.filter(c=>attendance[c.id]===null);
  if(unmarked.length>0){showToast("⚠️ Не отмечено: "+unmarked.length,true);return;}

  const dateStr=`${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()}`;
  const timeStr=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  const records=filtered.map(c=>({
    date:dateStr,
    city:c.city,
    dept:c.dept,
    group:c.group,
    name:c.name,
    status:attendance[c.id]===true?"present":"absent",
    marked_by:"",
    time:timeStr
  }));

  // Send to bot via Telegram WebApp
  if(tg && tg.sendData){
    tg.sendData(JSON.stringify({attendance:records}));
    showToast("💾 Отправлено!");
  } else {
    // Fallback for testing in browser
    showToast("💾 Журнал готов (тест)");
    console.log("Attendance data:", records);
  }
}

function showToast(msg,warn=false){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=warn?"var(--warning)":"var(--accent2)";
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);
}

// Start
loadChildren();
</script>
</body>
</html>
