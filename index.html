<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Горизонт — Посещаемость</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
    --accent:#4f8ef7;--accent2:#38d9a9;--danger:#ff6b6b;--warning:#ffd43b;
    --text:#e8eaf0;--text2:#8b90a8;--border:#2d3250;
    --radius:16px;--radius-sm:10px;--nav-h:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:var(--nav-h)}

  /* NAV */
  .nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:10px;cursor:pointer;transition:color .2s;padding-bottom:8px}
  .nav-btn.active{color:var(--accent)}

  /* HEADER */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-title{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .date-badge{font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:20px}

  /* SCREENS */
  .screen{display:none;padding:12px 16px}
  .screen.active{display:block}

  /* HOME */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .stat-card{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px}
  .stat-num{font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
  .stat-num.green{color:var(--accent2)}.stat-num.red{color:var(--danger)}.stat-num.blue{color:var(--accent)}.stat-num.yellow{color:var(--warning)}
  .stat-label{font-size:12px;color:var(--text2);font-weight:500}
  .section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px}
  .group-bar{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
  .group-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .group-bar-name{font-size:14px;font-weight:500}
  .group-bar-count{font-size:12px;color:var(--text2)}
  .progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;background:var(--accent2);transition:width .4s}
  .progress-fill.warn{background:var(--warning)}
  .home-actions{display:flex;gap:10px;margin-top:16px}

  /* ATTENDANCE */
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px}
  .filters::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .att-stats{display:flex;gap:10px;margin-bottom:12px}
  .att-stat{flex:1;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:10px;text-align:center}
  .att-stat-num{font-size:20px;font-weight:700}
  .att-stat-label{font-size:11px;color:var(--text2)}
  .group-section{margin-bottom:8px}
  .group-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px}
  .group-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
  .group-count{font-size:12px;color:var(--text2)}
  .child-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:border-color .2s,background .2s}
  .child-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .2s}
  .child-card.present{border-color:rgba(56,217,169,.3);background:rgba(56,217,169,.05)}.child-card.present::before{background:var(--accent2)}
  .child-card.absent{border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.05)}.child-card.absent::before{background:var(--danger)}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;background:var(--surface2);color:var(--accent)}
  .child-info{flex:1;min-width:0}
  .child-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .child-meta{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
  .time-badge{background:var(--surface2);padding:1px 7px;border-radius:8px;font-size:11px}
  .allergy-dot{width:5px;height:5px;border-radius:50%;background:var(--warning);flex-shrink:0}

  /* THREE-STATE TOGGLE */
  .toggle3{display:flex;gap:4px;flex-shrink:0}
  .t3-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
  .t3-btn.active-yes{background:rgba(56,217,169,.2);border-color:var(--accent2)}
  .t3-btn.active-no{background:rgba(255,107,107,.2);border-color:var(--danger)}

  /* CHILDREN LIST */
  .child-list-item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
  .child-list-item:active{border-color:var(--accent)}
  .child-arrow{color:var(--text2);font-size:16px;flex-shrink:0}
  .child-detail{flex:1;min-width:0}
  .child-detail-name{font-size:14px;font-weight:600;margin-bottom:2px}
  .child-detail-meta{font-size:12px;color:var(--text2)}
  .city-filter{display:flex;gap:8px;margin-bottom:12px}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end}
  .modal-overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;border-top:1px solid var(--border)}
  .modal-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px}
  .modal-name{font-size:19px;font-weight:700;margin-bottom:14px}
  .modal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
  .modal-row:last-child{border-bottom:none}
  .modal-label{color:var(--text2);min-width:80px}
  .modal-value{font-weight:500;text-align:right;max-width:65%;word-break:break-word}
  .allergy-chip{background:rgba(255,212,59,.15);color:var(--warning);border:1px solid rgba(255,212,59,.3);padding:2px 8px;border-radius:8px;font-size:11px}

  /* BOTTOM BAR */
  .bottom-action{position:fixed;bottom:var(--nav-h);left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;z-index:150}
  .btn-primary{flex:1;padding:13px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#6c63ff);color:#fff;font-family:'Geologica',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-primary:active{opacity:.8}
  .btn-secondary{padding:13px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap}

  /* TOAST */
  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--accent2);color:#0f1117;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
  .loading{text-align:center;padding:50px 20px;color:var(--text2)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* FORM */
  .form-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px}
  .form-section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
  .form-field{margin-bottom:12px}
  .form-label{font-size:12px;color:var(--text2);margin-bottom:5px}
  .form-input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;outline:none}
  .form-input:focus{border-color:var(--accent)}
  .form-select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;outline:none;appearance:none}
  .tab-bar{display:flex;gap:6px;margin-bottom:14px}
  .tab-btn{flex:1;padding:8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;text-align:center}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .trial-card{background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
  .trial-card:active,.trial-card.selected{border-color:var(--accent);background:rgba(79,142,247,.08)}
  .trial-name{font-size:14px;font-weight:600;margin-bottom:3px}
  .trial-meta{font-size:12px;color:var(--text2)}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text2);font-family:inherit;font-size:14px;cursor:pointer;padding:0;margin-bottom:14px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">🎓 Горизонт</div>
  <div class="date-badge" id="dateDisplay"></div>
</div>

<!-- SCREEN: HOME -->
<div class="screen active" id="screen-home">
  <div id="homeSwitcher"></div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num green" id="h-present">0</div><div class="stat-label">Пришли</div></div>
    <div class="stat-card"><div class="stat-num red" id="h-absent">0</div><div class="stat-label">Отсутствуют</div></div>
    <div class="stat-card"><div class="stat-num yellow" id="h-unmarked">0</div><div class="stat-label">Не отмечены</div></div>
    <div class="stat-card"><div class="stat-num blue" id="h-total">0</div><div class="stat-label">Всего детей</div></div>
  </div>
  <div class="section-title">Заполненность групп</div>
  <div id="groupBars"></div>
  <div class="home-actions">
    <button class="btn-primary" onclick="goTo('attendance')">Отметить явку</button>
    <button class="btn-secondary" onclick="goTo('children')">Список детей</button>
  </div>
</div>

<!-- SCREEN: ATTENDANCE -->
<div class="screen" id="screen-attendance">
  <div class="filters" id="attFilters"></div>
  <div class="att-stats">
    <div class="att-stat"><div class="att-stat-num green" id="a-present">0</div><div class="att-stat-label">Пришли</div></div>
    <div class="att-stat"><div class="att-stat-num red" id="a-absent">0</div><div class="att-stat-label">Нет</div></div>
    <div class="att-stat"><div class="att-stat-num" style="color:var(--text2)" id="a-unmarked">0</div><div class="att-stat-label">Не отмечены</div></div>
  </div>
  <div id="attList"></div>
  <div style="height:70px"></div>
</div>

<!-- SCREEN: CHILDREN -->
<div class="screen" id="screen-children">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="city-filter" id="cityFilter" style="margin-bottom:0;flex:1"></div>
    <button onclick="openAddForm()" style="flex-shrink:0;margin-left:8px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-family:inherit;font-size:13px;cursor:pointer;font-weight:500">+ Добавить</button>
  </div>
  <div id="childList"></div>
</div>

<!-- BOTTOM ACTION BAR (attendance only) -->
<div class="bottom-action" id="attActions" style="display:none">
  <button class="btn-secondary" onclick="markAllPresent()">Все пришли</button>
  <button class="btn-primary" onclick="saveAttendance()">Сохранить журнал</button>
</div>

<!-- SCREEN: ADD/EDIT CHILD -->
<div class="screen" id="screen-form">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <button onclick="goTo('children')" style="padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer">&#8592; Назад</button>
    <div style="font-size:16px;font-weight:600" id="formTitle">Новый ребёнок</div>
  </div>
  <div id="formTabs" style="display:flex;gap:8px;margin-bottom:14px">
    <button id="tabNew" onclick="switchFormTab('new')" class="filter-btn active">Новый</button>
    <button id="tabTrial" onclick="switchFormTab('trial')" class="filter-btn">Из пробного</button>
  </div>
  <div id="trialSelector" style="display:none;margin-bottom:14px">
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Выберите из последних пробных:</div>
    <div id="trialList"></div>
  </div>
  <div id="formFields">
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Имя ребёнка *</div>
      <input id="f_name" type="text" placeholder="Иван Иванов" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Дата рождения</div>
      <input id="f_dob" type="text" placeholder="01.01.2020" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Город *</div>
        <select id="f_city" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px">
          <option value="Дананг">Дананг</option>
          <option value="Нячанг">Нячанг</option>
        </select>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Направление *</div>
        <select id="f_dept" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px">
          <option value="Детский сад">Детский сад</option>
          <option value="Школа">Школа</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Группа/Класс *</div>
      <input id="f_group" type="text" placeholder="Младшая / 1 класс" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Тип *</div>
        <select id="f_type" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px">
          <option value="Полный">Полный</option>
          <option value="Короткий">Короткий</option>
          <option value="Посуточно">Посуточно</option>
        </select>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">До какого времени</div>
        <input id="f_until" type="text" placeholder="17:00" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Родитель</div>
      <input id="f_parent" type="text" placeholder="Имя родителя" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Телефон</div>
        <input id="f_phone" type="text" placeholder="+7 999..." style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Telegram</div>
        <input id="f_telegram" type="text" placeholder="@username" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
      </div>
    </div>
    <div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:6px">Особенности здоровья</div>
      <input id="f_allergy" type="text" placeholder="Аллергии, непереносимости..." style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none">
    </div>
    <button onclick="submitForm()" class="btn-primary" style="width:100%;margin-bottom:80px" id="formSubmitBtn">Добавить ребёнка</button>
  </div>
  <div style="height:80px"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-home" onclick="goTo('home')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    <span>Главная</span>
  </button>
  <button class="nav-btn" id="nav-attendance" onclick="goTo('attendance')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span>Явка</span>
  </button>
  <button class="nav-btn" id="nav-children" onclick="goTo('children')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>Дети</span>
  </button>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modalName"></div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://consent-could-gents.ngrok-free.dev";
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const now = new Date();
const days = ["вс","пн","вт","ср","чт","пт","сб"];
const months = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
document.getElementById("dateDisplay").textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

let children = [];
// attendance: null=unmarked, true=present, false=absent
const attendance = {};
let activeCity = "", activeDept = "", activeGroup = "Все группы";
let activeChildCity = "";
let currentScreen = "home";

// ── Navigation ────────────────────────────────────────────────────
function goTo(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("screen-" + screen).classList.add("active");
  document.getElementById("nav-" + screen)?.classList.add("active");
  document.getElementById("attActions").style.display = screen === "attendance" ? "flex" : "none";
  currentScreen = screen;
  if(screen === "home") renderHome();
  if(screen === "attendance") renderAttFilters();
  if(screen === "children") renderChildList();
  if(screen === "form") {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("nav-children")?.classList.add("active");
  }
}

// ── Load data ─────────────────────────────────────────────────────
async function loadChildren() {
  try {
    const resp = await fetch(API_URL + "/children", {
      headers: {"ngrok-skip-browser-warning": "true"}
    });
    if(!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if(!data.ok) throw new Error(data.error);
    children = data.children.filter(c => c.status !== "Выбыл" && c.name);
    children.forEach(c => { if(attendance[c.id] === undefined) attendance[c.id] = null; });

    // Если admin — показываем только его город
    if(staffInfo && staffInfo.role === "admin" && staffInfo.city) {
      children = children.filter(c => c.city === staffInfo.city);
    }

    const cities = [...new Set(children.map(c => c.city))];
    activeCity = cities[0] || "";
    activeChildCity = cities[0] || "";
    const depts = [...new Set(children.filter(c => c.city === activeCity).map(c => c.dept))];
    activeDept = depts[0] || "";
    console.log("Loaded:", children.length, "children");
    renderHome();
    renderAttFilters();
    renderChildList();
  } catch(e) {
    console.error("API error:", e);
    document.getElementById("attList").innerHTML = '<div class="empty">Не удалось загрузить данные</div>';
  }
}

// ── HOME ──────────────────────────────────────────────────────────
let homeCity = ""; // для директора/девелопера — выбранный город на главной

function renderHome() {
  const isDirector = !staffInfo || staffInfo.role === "director" || staffInfo.role === "developer";

  // Для admin — всегда его город
  // Для director/developer — homeCity или первый доступный
  let filterCity = "";
  if(!isDirector && staffInfo && staffInfo.city) {
    filterCity = staffInfo.city;
    homeCity = staffInfo.city;
  } else {
    const cities = [...new Set(children.map(c => c.city))];
    if(!homeCity && cities.length) homeCity = cities[0];
    filterCity = homeCity;
  }

  const filtered = filterCity ? children.filter(c => c.city === filterCity) : children;

  const total = filtered.length;
  const present = filtered.filter(c => attendance[c.id] === true).length;
  const absent = filtered.filter(c => attendance[c.id] === false).length;
  const unmarked = filtered.filter(c => attendance[c.id] === null).length;

  document.getElementById("h-present").textContent = present;
  document.getElementById("h-absent").textContent = absent;
  document.getElementById("h-unmarked").textContent = unmarked;
  document.getElementById("h-total").textContent = total;

  // City switcher for director/developer
  let switcherHtml = "";
  if(isDirector) {
    const cities = [...new Set(children.map(c => c.city))];
    if(cities.length > 1) {
      switcherHtml = '<div style="display:flex;gap:8px;margin-bottom:14px">';
      cities.forEach(city => {
        const active = city === homeCity;
        switcherHtml += "<button onclick=\"setHomeCity('" + city + "')\""
          + " style=\"padding:6px 16px;border-radius:20px;border:1.5px solid "
          + (active ? "var(--accent)" : "var(--border)")
          + ";background:" + (active ? "var(--accent)" : "transparent")
          + ";color:" + (active ? "#fff" : "var(--text2)")
          + ";font-family:inherit;font-size:13px;font-weight:" + (active ? "600" : "400")
          + ";cursor:pointer\">" + city + "</button>";
      });
      switcherHtml += '</div>';
    }
  }

  const groups = {};
  filtered.forEach(c => {
    if(!groups[c.group]) groups[c.group] = {present:0,total:0};
    groups[c.group].total++;
    if(attendance[c.id] === true) groups[c.group].present++;
  });

  let barsHtml = "";
  for(const [name, g] of Object.entries(groups)) {
    const pct = g.total > 0 ? Math.round(g.present / g.total * 100) : 0;
    const warn = pct < 50 ? "warn" : "";
    barsHtml += '<div class="group-bar">' +
      '<div class="group-bar-header">' +
        '<div class="group-bar-name">' + name + '</div>' +
        '<div class="group-bar-count">' + g.present + ' / ' + g.total + '</div>' +
      '</div>' +
      '<div class="progress"><div class="progress-fill ' + warn + '" style="width:' + pct + '%"></div></div>' +
    '</div>';
  }

  document.getElementById("homeSwitcher").innerHTML = switcherHtml;
  document.getElementById("groupBars").innerHTML = barsHtml || '<div class="empty">Нет данных</div>';
}

function setHomeCity(city) {
  homeCity = city;
  renderHome();
}

// ── ATTENDANCE ────────────────────────────────────────────────────
function renderAttFilters() {
  const cities = [...new Set(children.map(c => c.city))];
  const depts = [...new Set(children.filter(c => c.city === activeCity).map(c => c.dept))];
  const groups = ["Все группы", ...new Set(children.filter(c => c.city === activeCity && c.dept === activeDept).map(c => c.group))];
  const bar = document.getElementById("attFilters");
  bar.innerHTML = "";

  cities.forEach(city => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (city === activeCity ? " active" : "");
    btn.textContent = (city === "Дананг" ? "" : "") + city;
    btn.onclick = () => {
      activeCity = city;
      const d = [...new Set(children.filter(c => c.city === city).map(c => c.dept))];
      activeDept = d[0] || "";
      activeGroup = "Все группы";
      renderAttFilters();
    };
    bar.appendChild(btn);
  });

  const sep = document.createElement("div");
  sep.style.cssText = "width:1px;background:var(--border);flex-shrink:0;margin:0 4px";
  bar.appendChild(sep);

  depts.forEach(dept => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (dept === activeDept ? " active" : "");
    btn.textContent = dept === "Детский сад" ? "Сад" : "Школа";
    btn.onclick = () => { activeDept = dept; activeGroup = "Все группы"; renderAttFilters(); };
    bar.appendChild(btn);
  });

  if(groups.length > 2) {
    const sep2 = document.createElement("div");
    sep2.style.cssText = "width:1px;background:var(--border);flex-shrink:0;margin:0 4px";
    bar.appendChild(sep2);
    groups.forEach(g => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (g === activeGroup ? " active" : "");
      btn.textContent = g;
      btn.onclick = () => { activeGroup = g; renderAttFilters(); };
      bar.appendChild(btn);
    });
  }

  renderAttList();
}

function getFiltered() {
  return children.filter(c =>
    c.city === activeCity &&
    c.dept === activeDept &&
    (activeGroup === "Все группы" || c.group === activeGroup)
  );
}

function renderAttList() {
  const filtered = getFiltered();
  const byGroup = {};
  filtered.forEach(c => { if(!byGroup[c.group]) byGroup[c.group] = []; byGroup[c.group].push(c); });

  let present = 0, absent = 0, unmarked = 0;
  filtered.forEach(c => {
    if(attendance[c.id] === true) present++;
    else if(attendance[c.id] === false) absent++;
    else unmarked++;
  });

  document.getElementById("a-present").textContent = present;
  document.getElementById("a-absent").textContent = absent;
  document.getElementById("a-unmarked").textContent = unmarked;

  let html = "";
  for(const [group, kids] of Object.entries(byGroup)) {
    const gPresent = kids.filter(k => attendance[k.id] === true).length;
    html += `<div class="group-section">
      <div class="group-header">
        <div class="group-title">${group}</div>
        <div class="group-count">${gPresent}/${kids.length}</div>
      </div>`;

    kids.forEach(child => {
      const state = attendance[child.id];
      const cls = state === true ? "present" : state === false ? "absent" : "";
      const initials = child.name.split(" ").map(w => w[0]).join("").slice(0,2);
      const hasAllergy = child.allergy && child.allergy !== "Нет";
      const yesCls = state === true ? "active-yes" : "";
      const noCls = state === false ? "active-no" : "";

      html += `<div class="child-card ${cls}" onclick="openModal('${child.id}')">
        <div class="avatar">${initials}</div>
        <div class="child-info">
          <div class="child-name">${child.name}</div>
          <div class="child-meta">
            <span class="time-badge">до ${child.until}</span>
            <span>${child.type}</span>
            ${hasAllergy ? '<div class="allergy-dot"></div>' : ""}
          </div>
        </div>
        <div class="toggle3">
          <button class="t3-btn ${yesCls}" onclick="setAtt(event,'${child.id}',true)" title="Пришёл">✓</button>
          <button class="t3-btn ${noCls}" onclick="setAtt(event,'${child.id}',false)" title="Отсутствует">✗</button>
        </div>
      </div>`;
    });
    html += "</div>";
  }

  if(filtered.length === 0) html = '<div class="empty">Нет детей в этой группе</div>';
  document.getElementById("attList").innerHTML = html;
}

function setAtt(e, id, val) {
  e.stopPropagation();
  attendance[id] = attendance[id] === val ? null : val;
  renderAttList();
  if(currentScreen === "home") renderHome();
}

function markAllPresent() {
  getFiltered().forEach(c => attendance[c.id] = true);
  renderAttList();
  renderHome();
  showToast("Все отмечены");
}

// ── CHILDREN LIST ─────────────────────────────────────────────────
function renderChildList() {
  const cities = [...new Set(children.map(c => c.city))];
  const cf = document.getElementById("cityFilter");
  cf.innerHTML = "";
  cities.forEach(city => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (city === activeChildCity ? " active" : "");
    btn.textContent = (city === "Дананг" ? "" : "") + city;
    btn.onclick = () => { activeChildCity = city; renderChildList(); };
    cf.appendChild(btn);
  });

  const filtered = children.filter(c => c.city === activeChildCity);
  let html = "";
  filtered.forEach(child => {
    const initials = child.name.split(" ").map(w => w[0]).join("").slice(0,2);
    const age = child.dob ? calcAge(child.dob) : "";
    html += `<div class="child-list-item" onclick="openModal('${child.id}')">
      <div class="avatar">${initials}</div>
      <div class="child-detail">
        <div class="child-detail-name">${child.name}</div>
        <div class="child-detail-meta">${child.group}${age ? " · " + age : ""} · ${child.type}</div>
      </div>
      <button onclick="event.stopPropagation();openEditForm('${child.id}')" style="padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;margin-right:4px;flex-shrink:0">ред.</button>
      <span class="child-arrow">›</span>
    </div>`;
  });
  if(!filtered.length) html = '<div class="empty">Нет детей</div>';
  document.getElementById("childList").innerHTML = html;
}

function calcAge(dob) {
  try {
    const [d,m,y] = dob.split(".").map(Number);
    const diff = now - new Date(y, m-1, d);
    const years = Math.floor(diff / (365.25*24*3600*1000));
    if(years < 1) {
      const months = Math.floor(diff / (30.44*24*3600*1000));
      return months + " мес";
    }
    const last = years % 10, last2 = years % 100;
    const suffix = (11<=last2&&last2<=19) ? "лет" : last===1 ? "год" : (2<=last&&last<=4) ? "года" : "лет";
    return years + " " + suffix;
  } catch(e) { return ""; }
}

// ── MODAL ─────────────────────────────────────────────────────────
async function openModal(id) {
  const c = children.find(x => x.id == id);
  if(!c) return;
  window._currentChildForHistory = c;
  window._historyData = null;
  window._historyMonth = "current";

  document.getElementById("modalName").textContent = c.name;
  document.getElementById("modalContent").innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">Загружаем...</div>';
  document.getElementById("modalOverlay").classList.add("show");

  let history = {current:{present:0,absent:0,total:0}, prev:{present:0,absent:0,total:0}};
  try {
    const resp = await fetch(API_URL + "/history?name=" + encodeURIComponent(c.name) + "&city=" + encodeURIComponent(c.city), {
      headers: {"ngrok-skip-browser-warning": "true"}
    });
    const data = await resp.json();
    if(data.ok) history = data.history;
  } catch(e) { console.error("History:", e); }

  window._historyData = history;
  renderModal(c, history);
}

function renderModal(c, history) {
  const parts = (c.parent || "").split("|");
  const hasAllergy = c.allergy && c.allergy !== "Нет";
  const age = c.dob ? calcAge(c.dob) : "—";
  const state = attendance[c.id];
  const stateText = state === true ? "Пришёл" : state === false ? "Отсутствует" : "Не отмечен";
  const stateColor = state === true ? "var(--accent2)" : state === false ? "var(--danger)" : "var(--text2)";
  const mn = window._historyMonth || "current";

  const months = ["январь","февраль","март","апрель","май","июнь","июл","август","сентябрь","октябрь","ноябрь","декабрь"];
  const now2 = new Date();
  const curName = months[now2.getMonth()];
  const prevName = months[now2.getMonth() === 0 ? 11 : now2.getMonth()-1];
  const h = mn === "current" ? history.current : history.prev;

  // Variant V — compact chips style
  const todayLabel = state === true ? "Пришёл" : state === false ? "Отсутствует" : "—";

  document.getElementById("modalContent").innerHTML =
    // Subtitle
    '<div style="font-size:12px;color:var(--text2);margin-bottom:14px">' + age + " · " + c.group + " · " + c.type + " до " + c.until + '</div>' +
    // Stats bar with month switcher
    '<div style="background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:14px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
        '<div style="display:flex;gap:5px">' +
          '<button onclick="switchHist(&quot;current&quot;)" style="padding:2px 9px;border-radius:8px;border:1px solid var(--border);background:' + (mn==="current"?"var(--accent)":"transparent") + ';color:' + (mn==="current"?"#fff":"var(--text2)") + ';font-family:inherit;font-size:11px;cursor:pointer">' + curName + '</button>' +
          '<button onclick="switchHist(&quot;prev&quot;)" style="padding:2px 9px;border-radius:8px;border:1px solid var(--border);background:' + (mn==="prev"?"var(--accent)":"transparent") + ';color:' + (mn==="prev"?"#fff":"var(--text2)") + ';font-family:inherit;font-size:11px;cursor:pointer">' + prevName + '</button>' +
        '</div>' +
        '<span style="font-size:11px;color:var(--text2)">сегодня: <span style="font-weight:600;color:' + stateColor + '">' + todayLabel + '</span></span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">' +
        '<div style="text-align:center">' +
          '<div style="font-size:22px;font-weight:700;color:var(--accent2)">' + h.present + '</div>' +
          '<div style="font-size:11px;color:var(--text2)">присутствовал</div>' +
        '</div>' +
        '<div style="text-align:center">' +
          '<div style="font-size:22px;font-weight:700;color:var(--danger)">' + h.absent + '</div>' +
          '<div style="font-size:11px;color:var(--text2)">отсутствовал</div>' +
        '</div>' +
        '<div style="text-align:center">' +
          '<div style="font-size:22px;font-weight:700;color:var(--accent)">' + h.total + '</div>' +
          '<div style="font-size:11px;color:var(--text2)">всего дней</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    // Rows
    '<div style="border-top:1px solid var(--border);padding:9px 0;display:flex;justify-content:space-between;font-size:13px">' +
      '<span style="color:var(--text2)">Родитель</span>' +
      '<span style="font-weight:500">' + (parts[0]||"—").trim() + '</span>' +
    '</div>' +
    '<div style="border-top:1px solid var(--border);padding:9px 0;display:flex;justify-content:space-between;font-size:13px">' +
      '<span style="color:var(--text2)">Телефон</span>' +
      '<span style="font-weight:500">' + (parts[1]||"—").trim() + '</span>' +
    '</div>' +
    '<div style="border-top:1px solid var(--border);padding:9px 0;display:flex;justify-content:space-between;font-size:13px">' +
      '<span style="color:var(--text2)">Telegram</span>' +
      '<span style="font-weight:500;color:var(--accent)">' + (parts[2]||"—").trim() + '</span>' +
    '</div>' +
    (hasAllergy ?
      '<div style="border-top:1px solid var(--border);padding:9px 0;display:flex;justify-content:space-between;align-items:center;font-size:13px">' +
        '<span style="color:var(--text2)">Особенности</span>' +
        '<span class="allergy-chip">' + c.allergy + '</span>' +
      '</div>' : "") +
    '<div style="height:6px"></div>';
}

function switchHist(month) {
  window._historyMonth = month;
  if(window._currentChildForHistory && window._historyData) {
    renderModal(window._currentChildForHistory, window._historyData);
  }
}

function closeModal(e) {
  if(e.target === document.getElementById("modalOverlay"))
    document.getElementById("modalOverlay").classList.remove("show");
}

// ── SAVE ──────────────────────────────────────────────────────────
async function saveAttendance() {
  const filtered = getFiltered();
  const unmarked = filtered.filter(c => attendance[c.id] === null);
  if(unmarked.length > 0) { showToast("Не отмечено: " + unmarked.length + " детей", true); return; }

  const dateStr = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const records = filtered.map(c => ({
    date: dateStr, city: c.city, dept: c.dept, group: c.group,
    name: c.name, status: attendance[c.id] === true ? "present" : "absent",
    marked_by: "", time: timeStr
  }));

  try {
    const resp = await fetch(API_URL + "/attendance", {
      method: "POST",
      headers: {"Content-Type": "application/json", "ngrok-skip-browser-warning": "true"},
      body: JSON.stringify({attendance: records})
    });
    const result = await resp.json();
    if(result.ok) { showToast("Журнал сохранён"); }
    else { showToast("Ошибка: " + result.error, true); }
  } catch(e) {
    showToast("Ошибка сети", true);
  }
}

// ── UTILS ─────────────────────────────────────────────────────────
function showToast(msg, warn=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = warn ? "var(--warning)" : "var(--accent2)";
  t.style.color = "#0f1117";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

let staffInfo = null;

async function initStaff(){
  try {
    const tgId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "";
    if(!tgId) return;
    const resp = await fetch(API_URL + "/staff?tg_id=" + tgId, {
      headers: {"ngrok-skip-browser-warning": "true"}
    });
    const data = await resp.json();
    if(data.ok) {
      staffInfo = data.staff;
      console.log("Staff:", staffInfo);
    }
  } catch(e) {
    console.error("Staff error:", e);
  }
}

// ── FORM ─────────────────────────────────────────────────────────
let formMode = "add";
let editChildId = null;

function openAddForm() {
  formMode = "add"; editChildId = null;
  if(!document.getElementById("formTitle")) { console.error("formTitle not found"); return; }
  document.getElementById("formTitle").textContent = "Новый ребёнок";
  document.getElementById("formTabs").style.display = "flex";
  document.getElementById("formSubmitBtn").textContent = "Добавить ребёнка";
  clearForm();
  switchFormTab("new");
  if(staffInfo && staffInfo.city) document.getElementById("f_city").value = staffInfo.city;
  goTo("form");
}

function openEditForm(id) {
  const c = children.find(x => x.id == id);
  if(!c) return;
  formMode = "edit"; editChildId = id;
  document.getElementById("formTitle").textContent = "Редактировать";
  document.getElementById("formTabs").style.display = "none";
  document.getElementById("trialSelector").style.display = "none";
  document.getElementById("formSubmitBtn").textContent = "Сохранить изменения";
  document.getElementById("f_name").value = c.name || "";
  document.getElementById("f_dob").value = c.dob || "";
  document.getElementById("f_city").value = c.city || "Дананг";
  document.getElementById("f_dept").value = c.dept || "Детский сад";
  document.getElementById("f_group").value = c.group || "";
  document.getElementById("f_type").value = c.type || "Полный";
  document.getElementById("f_until").value = c.until || "";
  const parts = (c.parent || "").split("|");
  document.getElementById("f_parent").value = (parts[0]||"").trim();
  document.getElementById("f_phone").value = (parts[1]||"").trim();
  document.getElementById("f_telegram").value = (parts[2]||"").trim();
  document.getElementById("f_allergy").value = (c.allergy && c.allergy !== "Нет") ? c.allergy : "";
  goTo("form");
}

function clearForm() {
  ["f_name","f_dob","f_group","f_until","f_parent","f_phone","f_telegram","f_allergy"].forEach(id => {
    document.getElementById(id).value = "";
  });
}

function switchFormTab(tab) {
  document.getElementById("tabNew").className = "filter-btn" + (tab === "new" ? " active" : "");
  document.getElementById("tabTrial").className = "filter-btn" + (tab === "trial" ? " active" : "");
  document.getElementById("trialSelector").style.display = tab === "trial" ? "block" : "none";
  if(tab === "trial") loadTrials();
}

async function loadTrials() {
  const city = staffInfo && staffInfo.city ? staffInfo.city : "";
  try {
    const resp = await fetch(API_URL + "/trials?city=" + encodeURIComponent(city), {
      headers: {"ngrok-skip-browser-warning": "true"}
    });
    const data = await resp.json();
    if(!data.ok) throw new Error(data.error);
    const list = document.getElementById("trialList");
    if(!data.trials.length) {
      list.innerHTML = "<div style='color:var(--text2);font-size:13px;padding:10px 0'>Нет подтверждённых пробных</div>";
      return;
    }
    window._trialData = data.trials;
    list.innerHTML = data.trials.map((t,i) =>
      "<div onclick='fillFromTrial(" + i + ")' style='background:var(--surface2);border-radius:10px;padding:10px 14px;margin-bottom:8px;cursor:pointer;border:1.5px solid var(--border)'>" +
        "<div style='font-size:14px;font-weight:500'>" + (t.child_name||"—") + "</div>" +
        "<div style='font-size:12px;color:var(--text2);margin-top:2px'>" + (t.city||"") + " · " + (t.dept||"") + " · " + (t.date||"") + "</div>" +
      "</div>"
    ).join("");
  } catch(e) { console.error("Trials:", e); }
}

function fillFromTrial(idx) {
  const t = window._trialData[idx];
  if(!t) return;
  document.getElementById("f_name").value = t.child_name || "";
  document.getElementById("f_city").value = t.city || "Дананг";
  document.getElementById("f_dept").value = t.dept || "Детский сад";
  document.getElementById("f_parent").value = t.parent || "";
  document.getElementById("f_phone").value = t.phone || "";
  document.getElementById("f_telegram").value = t.telegram || "";
  document.getElementById("f_allergy").value = t.allergy || "";
  switchFormTab("new");
  showToast("Данные заполнены");
}

async function submitForm() {
  const name = document.getElementById("f_name").value.trim();
  const group = document.getElementById("f_group").value.trim();
  if(!name) { showToast("Введите имя ребёнка", true); return; }
  if(!group) { showToast("Введите группу", true); return; }

  const payload = {
    name, group,
    dob: document.getElementById("f_dob").value.trim(),
    city: document.getElementById("f_city").value,
    dept: document.getElementById("f_dept").value,
    type: document.getElementById("f_type").value,
    until: document.getElementById("f_until").value.trim(),
    parent: document.getElementById("f_parent").value.trim(),
    phone: document.getElementById("f_phone").value.trim(),
    telegram: document.getElementById("f_telegram").value.trim(),
    allergy: document.getElementById("f_allergy").value.trim() || "Нет",
    status: "Активный",
  };

  try {
    const url = formMode === "add" ? API_URL + "/children" : API_URL + "/children/" + editChildId;
    const method = formMode === "add" ? "POST" : "PUT";
    const resp = await fetch(url, {
      method,
      headers: {"Content-Type": "application/json", "ngrok-skip-browser-warning": "true"},
      body: JSON.stringify(payload)
    });
    const result = await resp.json();
    if(result.ok) {
      showToast(formMode === "add" ? "Ребёнок добавлен!" : "Данные сохранены!");
      await loadChildren();
      goTo("children");
    } else {
      showToast("Ошибка: " + result.error, true);
    }
  } catch(e) {
    showToast("Ошибка сети", true);
  }
}

initStaff().then(() => loadChildren());
</script>
</body>
</html>
