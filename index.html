<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Горизонт — Посещаемость</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
    --accent:#4f8ef7;--accent2:#38d9a9;--danger:#ff6b6b;--warning:#ffd43b;
    --text:#e8eaf0;--text2:#8b90a8;--border:#2d3250;
    --radius:16px;--radius-sm:10px;--nav-h:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:var(--nav-h)}

  /* NAV */
  .nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:10px;cursor:pointer;transition:color .2s;padding-bottom:8px}
  .nav-btn.active{color:var(--accent)}
  .nav-icon{font-size:22px;line-height:1}

  /* HEADER */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-title{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .date-badge{font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:20px}

  /* SCREENS */
  .screen{display:none;padding:12px 16px}
  .screen.active{display:block}

  /* HOME */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .stat-card{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px}
  .stat-num{font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
  .stat-num.green{color:var(--accent2)}.stat-num.red{color:var(--danger)}.stat-num.blue{color:var(--accent)}.stat-num.yellow{color:var(--warning)}
  .stat-label{font-size:12px;color:var(--text2);font-weight:500}
  .section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px}
  .group-bar{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
  .group-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .group-bar-name{font-size:14px;font-weight:500}
  .group-bar-count{font-size:12px;color:var(--text2)}
  .progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;background:var(--accent2);transition:width .4s}
  .progress-fill.warn{background:var(--warning)}
  .home-actions{display:flex;gap:10px;margin-top:16px}

  /* ATTENDANCE */
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px}
  .filters::-webkit-scrollbar{display:none}
  .filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .att-stats{display:flex;gap:10px;margin-bottom:12px}
  .att-stat{flex:1;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:10px;text-align:center}
  .att-stat-num{font-size:20px;font-weight:700}
  .att-stat-label{font-size:11px;color:var(--text2)}
  .group-section{margin-bottom:8px}
  .group-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px}
  .group-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
  .group-count{font-size:12px;color:var(--text2)}
  .child-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:border-color .2s,background .2s}
  .child-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .2s}
  .child-card.present{border-color:rgba(56,217,169,.3);background:rgba(56,217,169,.05)}.child-card.present::before{background:var(--accent2)}
  .child-card.absent{border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.05)}.child-card.absent::before{background:var(--danger)}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;background:var(--surface2);color:var(--accent)}
  .child-info{flex:1;min-width:0}
  .child-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .child-meta{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
  .time-badge{background:var(--surface2);padding:1px 7px;border-radius:8px;font-size:11px}
  .allergy-dot{width:5px;height:5px;border-radius:50%;background:var(--warning);flex-shrink:0}

  /* THREE-STATE TOGGLE */
  .toggle3{display:flex;gap:4px;flex-shrink:0}
  .t3-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
  .t3-btn.active-yes{background:rgba(56,217,169,.2);border-color:var(--accent2)}
  .t3-btn.active-no{background:rgba(255,107,107,.2);border-color:var(--danger)}

  /* CHILDREN LIST */
  .child-list-item{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
  .child-list-item:active{border-color:var(--accent)}
  .child-arrow{color:var(--text2);font-size:16px;flex-shrink:0}
  .child-detail{flex:1;min-width:0}
  .child-detail-name{font-size:14px;font-weight:600;margin-bottom:2px}
  .child-detail-meta{font-size:12px;color:var(--text2)}
  .city-filter{display:flex;gap:8px;margin-bottom:12px}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end}
  .modal-overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;border-top:1px solid var(--border)}
  .modal-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px}
  .modal-name{font-size:19px;font-weight:700;margin-bottom:14px}
  .modal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
  .modal-row:last-child{border-bottom:none}
  .modal-label{color:var(--text2);min-width:80px}
  .modal-value{font-weight:500;text-align:right;max-width:65%;word-break:break-word}
  .allergy-chip{background:rgba(255,212,59,.15);color:var(--warning);border:1px solid rgba(255,212,59,.3);padding:2px 8px;border-radius:8px;font-size:11px}

  /* BOTTOM BAR */
  .bottom-action{position:fixed;bottom:var(--nav-h);left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;z-index:150}
  .btn-primary{flex:1;padding:13px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#6c63ff);color:#fff;font-family:'Geologica',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-primary:active{opacity:.8}
  .btn-secondary{padding:13px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Geologica',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap}

  /* TOAST */
  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--accent2);color:#0f1117;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
  .loading{text-align:center;padding:50px 20px;color:var(--text2)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">Горизонт — учёт</div>
  <div class="date-badge" id="dateDisplay"></div>
</div>

<!-- SCREEN: HOME -->
<div class="screen active" id="screen-home">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num green" id="h-present">0</div><div class="stat-label">Пришли</div></div>
    <div class="stat-card"><div class="stat-num red" id="h-absent">0</div><div class="stat-label">Отсутствуют</div></div>
    <div class="stat-card"><div class="stat-num yellow" id="h-unmarked">0</div><div class="stat-label">Не отмечены</div></div>
    <div class="stat-card"><div class="stat-num blue" id="h-total">0</div><div class="stat-label">Всего детей</div></div>
  </div>
  <div class="section-title">Заполненность групп</div>
  <div id="groupBars"></div>
  <div class="home-actions">
    <button class="btn-primary" onclick="goTo('attendance')">Отметить явку</button>
    <button class="btn-secondary" onclick="goTo('children')">Список детей</button>
  </div>
</div>

<!-- SCREEN: ATTENDANCE -->
<div class="screen" id="screen-attendance">
  <div class="filters" id="attFilters"></div>
  <div class="att-stats">
    <div class="att-stat"><div class="att-stat-num green" id="a-present">0</div><div class="att-stat-label">Пришли</div></div>
    <div class="att-stat"><div class="att-stat-num red" id="a-absent">0</div><div class="att-stat-label">Нет</div></div>
    <div class="att-stat"><div class="att-stat-num" style="color:var(--text2)" id="a-unmarked">0</div><div class="att-stat-label">Не отмечены</div></div>
  </div>
  <div id="attList"></div>
  <div style="height:70px"></div>
</div>

<!-- SCREEN: CHILDREN -->
<div class="screen" id="screen-children">
  <div class="city-filter" id="cityFilter"></div>
  <div id="childList"></div>
</div>

<!-- BOTTOM ACTION BAR (attendance only) -->
<div class="bottom-action" id="attActions" style="display:none">
  <button class="btn-secondary" onclick="markAllPresent()">Все пришли</button>
  <button class="btn-primary" onclick="saveAttendance()">Сохранить журнал</button>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-home" onclick="goTo('home')">
    <span class="nav-icon">Главная</span><span>Главная</span>
  </button>
  <button class="nav-btn" id="nav-attendance" onclick="goTo('attendance')">
    <span class="nav-icon">Явка</span><span>Явка</span>
  </button>
  <button class="nav-btn" id="nav-children" onclick="goTo('children')">
    <span class="nav-icon">Дети</span><span>Дети</span>
  </button>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modalName"></div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://consent-could-gents.ngrok-free.dev";
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const now = new Date();
const days = ["вс","пн","вт","ср","чт","пт","сб"];
const months = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
document.getElementById("dateDisplay").textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

let children = [];
// attendance: null=unmarked, true=present, false=absent
const attendance = {};
let activeCity = "", activeDept = "", activeGroup = "Все группы";
let activeChildCity = "";
let currentScreen = "home";

// ── Navigation ────────────────────────────────────────────────────
function goTo(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("screen-" + screen).classList.add("active");
  document.getElementById("nav-" + screen)?.classList.add("active");
  document.getElementById("attActions").style.display = screen === "attendance" ? "flex" : "none";
  currentScreen = screen;
  if(screen === "home") renderHome();
  if(screen === "attendance") renderAttFilters();
  if(screen === "children") renderChildList();
}

// ── Load data ─────────────────────────────────────────────────────
async function loadChildren() {
  try {
    const resp = await fetch(API_URL + "/children", {
      headers: {"ngrok-skip-browser-warning": "true"}
    });
    if(!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if(!data.ok) throw new Error(data.error);
    children = data.children.filter(c => c.status !== "Выбыл" && c.name);
    children.forEach(c => { if(attendance[c.id] === undefined) attendance[c.id] = null; });
    const cities = [...new Set(children.map(c => c.city))];
    activeCity = cities[0] || "";
    activeChildCity = cities[0] || "";
    const depts = [...new Set(children.filter(c => c.city === activeCity).map(c => c.dept))];
    activeDept = depts[0] || "";
    console.log("Loaded:", children.length, "children");
    renderHome();
    renderAttFilters();
    renderChildList();
  } catch(e) {
    console.error("API error:", e);
    document.getElementById("attList").innerHTML = '<div class="empty">Не удалось загрузить данные</div>';
  }
}

// ── HOME ──────────────────────────────────────────────────────────
function renderHome() {
  const total = children.length;
  const present = Object.values(attendance).filter(v => v === true).length;
  const absent = Object.values(attendance).filter(v => v === false).length;
  const unmarked = Object.values(attendance).filter(v => v === null).length;
  document.getElementById("h-present").textContent = present;
  document.getElementById("h-absent").textContent = absent;
  document.getElementById("h-unmarked").textContent = unmarked;
  document.getElementById("h-total").textContent = total;

  const groups = {};
  children.forEach(c => {
    if(!groups[c.group]) groups[c.group] = {present:0,total:0};
    groups[c.group].total++;
    if(attendance[c.id] === true) groups[c.group].present++;
  });

  let html = "";
  for(const [name, g] of Object.entries(groups)) {
    const pct = g.total > 0 ? Math.round(g.present / g.total * 100) : 0;
    const warn = pct < 50 ? "warn" : "";
    html += `<div class="group-bar">
      <div class="group-bar-header">
        <div class="group-bar-name">${name}</div>
        <div class="group-bar-count">${g.present} / ${g.total}</div>
      </div>
      <div class="progress"><div class="progress-fill ${warn}" style="width:${pct}%"></div></div>
    </div>`;
  }
  document.getElementById("groupBars").innerHTML = html || '<div class="empty">Загружаем...</div>';
}

// ── ATTENDANCE ────────────────────────────────────────────────────
function renderAttFilters() {
  const cities = [...new Set(children.map(c => c.city))];
  const depts = [...new Set(children.filter(c => c.city === activeCity).map(c => c.dept))];
  const groups = ["Все группы", ...new Set(children.filter(c => c.city === activeCity && c.dept === activeDept).map(c => c.group))];
  const bar = document.getElementById("attFilters");
  bar.innerHTML = "";

  cities.forEach(city => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (city === activeCity ? " active" : "");
    btn.textContent = (city === "Дананг" ? "" : "") + city;
    btn.onclick = () => {
      activeCity = city;
      const d = [...new Set(children.filter(c => c.city === city).map(c => c.dept))];
      activeDept = d[0] || "";
      activeGroup = "Все группы";
      renderAttFilters();
    };
    bar.appendChild(btn);
  });

  const sep = document.createElement("div");
  sep.style.cssText = "width:1px;background:var(--border);flex-shrink:0;margin:0 4px";
  bar.appendChild(sep);

  depts.forEach(dept => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (dept === activeDept ? " active" : "");
    btn.textContent = dept === "Детский сад" ? "Сад" : "Школа";
    btn.onclick = () => { activeDept = dept; activeGroup = "Все группы"; renderAttFilters(); };
    bar.appendChild(btn);
  });

  if(groups.length > 2) {
    const sep2 = document.createElement("div");
    sep2.style.cssText = "width:1px;background:var(--border);flex-shrink:0;margin:0 4px";
    bar.appendChild(sep2);
    groups.forEach(g => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (g === activeGroup ? " active" : "");
      btn.textContent = g;
      btn.onclick = () => { activeGroup = g; renderAttFilters(); };
      bar.appendChild(btn);
    });
  }

  renderAttList();
}

function getFiltered() {
  return children.filter(c =>
    c.city === activeCity &&
    c.dept === activeDept &&
    (activeGroup === "Все группы" || c.group === activeGroup)
  );
}

function renderAttList() {
  const filtered = getFiltered();
  const byGroup = {};
  filtered.forEach(c => { if(!byGroup[c.group]) byGroup[c.group] = []; byGroup[c.group].push(c); });

  let present = 0, absent = 0, unmarked = 0;
  filtered.forEach(c => {
    if(attendance[c.id] === true) present++;
    else if(attendance[c.id] === false) absent++;
    else unmarked++;
  });

  document.getElementById("a-present").textContent = present;
  document.getElementById("a-absent").textContent = absent;
  document.getElementById("a-unmarked").textContent = unmarked;

  let html = "";
  for(const [group, kids] of Object.entries(byGroup)) {
    const gPresent = kids.filter(k => attendance[k.id] === true).length;
    html += `<div class="group-section">
      <div class="group-header">
        <div class="group-title">${group}</div>
        <div class="group-count">${gPresent}/${kids.length}</div>
      </div>`;

    kids.forEach(child => {
      const state = attendance[child.id];
      const cls = state === true ? "present" : state === false ? "absent" : "";
      const initials = child.name.split(" ").map(w => w[0]).join("").slice(0,2);
      const hasAllergy = child.allergy && child.allergy !== "Нет";
      const yesCls = state === true ? "active-yes" : "";
      const noCls = state === false ? "active-no" : "";

      html += `<div class="child-card ${cls}" onclick="openModal('${child.id}')">
        <div class="avatar">${initials}</div>
        <div class="child-info">
          <div class="child-name">${child.name}</div>
          <div class="child-meta">
            <span class="time-badge">до ${child.until}</span>
            <span>${child.type}</span>
            ${hasAllergy ? '<div class="allergy-dot"></div>' : ""}
          </div>
        </div>
        <div class="toggle3">
          <button class="t3-btn ${yesCls}" onclick="setAtt(event,'${child.id}',true)" title="Пришёл">Да</button>
          <button class="t3-btn ${noCls}" onclick="setAtt(event,'${child.id}',false)" title="Отсутствует">Нет</button>
        </div>
      </div>`;
    });
    html += "</div>";
  }

  if(filtered.length === 0) html = '<div class="empty">Нет детей в этой группе</div>';
  document.getElementById("attList").innerHTML = html;
}

function setAtt(e, id, val) {
  e.stopPropagation();
  attendance[id] = attendance[id] === val ? null : val;
  renderAttList();
  if(currentScreen === "home") renderHome();
}

function markAllPresent() {
  getFiltered().forEach(c => attendance[c.id] = true);
  renderAttList();
  renderHome();
  showToast("Все отмечены");
}

// ── CHILDREN LIST ─────────────────────────────────────────────────
function renderChildList() {
  const cities = [...new Set(children.map(c => c.city))];
  const cf = document.getElementById("cityFilter");
  cf.innerHTML = "";
  cities.forEach(city => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (city === activeChildCity ? " active" : "");
    btn.textContent = (city === "Дананг" ? "" : "") + city;
    btn.onclick = () => { activeChildCity = city; renderChildList(); };
    cf.appendChild(btn);
  });

  const filtered = children.filter(c => c.city === activeChildCity);
  let html = "";
  filtered.forEach(child => {
    const initials = child.name.split(" ").map(w => w[0]).join("").slice(0,2);
    const age = child.dob ? calcAge(child.dob) : "";
    html += `<div class="child-list-item" onclick="openModal('${child.id}')">
      <div class="avatar">${initials}</div>
      <div class="child-detail">
        <div class="child-detail-name">${child.name}</div>
        <div class="child-detail-meta">${child.group}${age ? " · " + age : ""} · ${child.type}</div>
      </div>
      <span class="child-arrow">›</span>
    </div>`;
  });
  if(!filtered.length) html = '<div class="empty">Нет детей</div>';
  document.getElementById("childList").innerHTML = html;
}

function calcAge(dob) {
  try {
    const [d,m,y] = dob.split(".").map(Number);
    const diff = now - new Date(y, m-1, d);
    const years = Math.floor(diff / (365.25*24*3600*1000));
    if(years < 1) {
      const months = Math.floor(diff / (30.44*24*3600*1000));
      return months + " мес";
    }
    const last = years % 10, last2 = years % 100;
    const suffix = (11<=last2&&last2<=19) ? "лет" : last===1 ? "год" : (2<=last&&last<=4) ? "года" : "лет";
    return years + " " + suffix;
  } catch(e) { return ""; }
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(id) {
  const c = children.find(x => x.id == id);
  if(!c) return;
  const parts = (c.parent || "").split("|");
  const hasAllergy = c.allergy && c.allergy !== "Нет";
  const age = c.dob ? calcAge(c.dob) : "—";
  const stateText = attendance[id] === true ? "Пришёл" : attendance[id] === false ? "Отсутствует" : "Не отмечен";

  document.getElementById("modalName").textContent = c.name;
  document.getElementById("modalContent").innerHTML = `
    <div class="modal-row"><span class="modal-label">Возраст</span><span class="modal-value">${age}</span></div>
    <div class="modal-row"><span class="modal-label">Группа</span><span class="modal-value">${c.group}</span></div>
    <div class="modal-row"><span class="modal-label">Тип</span><span class="modal-value">${c.type} · до ${c.until}</span></div>
    <div class="modal-row"><span class="modal-label">Родитель</span><span class="modal-value">${parts[0]?.trim()||"—"}</span></div>
    <div class="modal-row"><span class="modal-label">Телефон</span><span class="modal-value">${parts[1]?.trim()||"—"}</span></div>
    <div class="modal-row"><span class="modal-label">Telegram</span><span class="modal-value">${parts[2]?.trim()||"—"}</span></div>
    <div class="modal-row"><span class="modal-label">Аллергии</span><span class="modal-value">${hasAllergy ? '<span class="allergy-chip">' + c.allergy + '</span>' : "Нет"}</span></div>
    <div class="modal-row"><span class="modal-label">Оплата</span><span class="modal-value">${c.payment_status||"—"}</span></div>
    <div class="modal-row"><span class="modal-label">Сегодня</span><span class="modal-value">${stateText}</span></div>
  `;
  document.getElementById("modalOverlay").classList.add("show");
}

function closeModal(e) {
  if(e.target === document.getElementById("modalOverlay"))
    document.getElementById("modalOverlay").classList.remove("show");
}

// ── SAVE ──────────────────────────────────────────────────────────
async function saveAttendance() {
  const filtered = getFiltered();
  const unmarked = filtered.filter(c => attendance[c.id] === null);
  if(unmarked.length > 0) { showToast("Не отмечено: " + unmarked.length + " детей", true); return; }

  const dateStr = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const records = filtered.map(c => ({
    date: dateStr, city: c.city, dept: c.dept, group: c.group,
    name: c.name, status: attendance[c.id] === true ? "present" : "absent",
    marked_by: "", time: timeStr
  }));

  try {
    const resp = await fetch(API_URL + "/attendance", {
      method: "POST",
      headers: {"Content-Type": "application/json", "ngrok-skip-browser-warning": "true"},
      body: JSON.stringify({attendance: records})
    });
    const result = await resp.json();
    if(result.ok) { showToast("Журнал сохранён"); }
    else { showToast("Ошибка: " + result.error, true); }
  } catch(e) {
    showToast("Ошибка сети", true);
  }
}

// ── UTILS ─────────────────────────────────────────────────────────
function showToast(msg, warn=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = warn ? "var(--warning)" : "var(--accent2)";
  t.style.color = "#0f1117";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

loadChildren();
